name: NPM Release
on:
  workflow_dispatch:
  release:
    types:
      - published
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  npm_release:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # publish to npmjs.org with provenance
      packages: write # publish to the GitHub Packages registry
    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Fetch unshallow repo"
        run: git fetch --prune --unshallow
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - name: Set up auth for GitHub packages
        run: |
          npm config set "//npm.pkg.github.com/:_authToken" "\${NODE_AUTH_TOKEN}"
      - name: Update npm packages to latest version
        working-directory: ./npm/@fastly/cli
        env:
          RELEASE_REF: ${{ github.ref_name }}
        run: npm install && npm version "$RELEASE_REF" --allow-same-version
      - name: Publish packages to npmjs.org
        working-directory: ./npm/@fastly
        run: |
          for dir in *; do
            (
              echo $dir
              cd $dir
              npm publish --access=public
            )
          done
      - name: Publish packages to GitHub packages
        working-directory: ./npm/@fastly
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set "@fastly:registry" "https://npm.pkg.github.com/"
          for dir in *; do
            (
              echo $dir
              cd $dir
              npm publish --access=public
            )
          done
