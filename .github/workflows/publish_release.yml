name: Publish Release
on:
  workflow_dispatch:
  release:
    types:
      - published
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  homebrew_release:
    name: Publish Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - name: "Generate a GitHub token"
        id: github-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.repository }}
            homebrew-tap
          permission-contents: write
      - name: "Download Homebrew formula artifact"
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: tag_to_draft_release.yml
          name: homebrew-formula-${{ github.event.release.tag_name }}
          github_token: ${{ steps.github-token.outputs.token }}
      - name: "Checkout homebrew-tap repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: fastly/homebrew-tap
          path: homebrew-tap
          persist-credentials: false
      - name: "Copy formula to homebrew-tap repository"
        run: |
          cp fastly.rb homebrew-tap/Formula/fastly.rb
      - name: "Commit and push Homebrew formula"
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fastly.rb
          git commit -m "Update fastly formula to ${RELEASE_TAG}"
          git push https://x-access-token:${GH_TOKEN}@github.com/fastly/homebrew-tap.git
  npm_release:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # publish to npmjs.org with provenance
      packages: write # publish to the GitHub Packages registry
    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Fetch unshallow repo"
        run: git fetch --prune --unshallow
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - name: Set up auth for GitHub packages
        run: |
          npm config set "//npm.pkg.github.com/:_authToken" "\${NODE_AUTH_TOKEN}"
      - name: Update npm packages to latest version
        working-directory: ./npm/@fastly/cli
        env:
          RELEASE_REF: ${{ github.ref_name }}
        run: npm install && npm version "$RELEASE_REF" --allow-same-version
      - name: Publish packages to npmjs.org
        working-directory: ./npm/@fastly
        run: |
          for dir in *; do
            (
              echo $dir
              cd $dir
              npm publish --access=public
            )
          done
      - name: Publish packages to GitHub packages
        working-directory: ./npm/@fastly
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set "@fastly:registry" "https://npm.pkg.github.com/"
          for dir in *; do
            (
              echo $dir
              cd $dir
              npm publish --access=public
            )
          done
